# Pre-commit hooks configuration
# Install: pip install pre-commit (or uv pip install pre-commit)
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Commit message validation (Conventional Commits)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|.*\.lock|.*\.json)$
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--safe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Backend: Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: black (Python formatter)
        language_version: python3.11
        files: ^backend/.*\.py$
        args: [--line-length=100]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (Python import sorter)
        files: ^backend/.*\.py$
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        name: ruff (Python linter)
        files: ^backend/.*\.py$
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        name: mypy (Python type checker)
        files: ^backend/.*\.py$
        additional_dependencies: [types-all]
        args: [--ignore-missing-imports, --python-version=3.11]
        exclude: ^backend/(tests|alembic)/

  # Backend: Python tests (only unit tests for speed)
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests only)
        entry: bash -c 'cd backend && uv run pytest -m unit --tb=short -q || (echo "Unit tests failed or pytest not installed" && exit 1)'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        always_run: false
        require_serial: true

  # Frontend: TypeScript/JavaScript formatting and linting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.1
    hooks:
      - id: prettier
        name: prettier (TypeScript/JavaScript formatter)
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        exclude: ^frontend/(node_modules|\.next|out|build)/

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: eslint (TypeScript/JavaScript linter)
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        exclude: ^frontend/(node_modules|\.next|out|build)/
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-next@14.0.4
          - '@typescript-eslint/parser@^6.0.0'
          - '@typescript-eslint/eslint-plugin@^6.0.0'
        args: [--fix, --max-warnings=0]

  # Frontend: TypeScript type checking
  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript type check
        entry: bash -c 'cd frontend && npm run type-check || (echo "Type-check script not found. Run: npm install" && exit 1)'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
        always_run: false
        require_serial: true

  # Frontend: Next.js build check (optional, can be slow)
  # Uncomment if you want to ensure the project builds before commit
  # - repo: local
  #   hooks:
  #     - id: next-build-check
  #       name: Next.js build check
  #       entry: bash -c 'cd frontend && npm run build'
  #       language: system
  #       files: ^frontend/.*\.(ts|tsx|js|jsx)$
  #       pass_filenames: false
  #       always_run: false
  #       stages: [pre-push]  # Only run on push, not on every commit

